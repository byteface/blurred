name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact_name: blurred-linux
          - os: windows-latest
            label: windows
            artifact_name: blurred-windows
          - os: macos-latest
            label: macos
            artifact_name: blurred-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libxft-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libglib2.0-dev \
            libcairo2-dev

      - name: Build release binary
        run: cargo build --release

      - name: Package Linux
        if: matrix.label == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/blurred-linux-${GITHUB_REF_NAME}.tar.gz" -C target/release blurred

      - name: Package Windows
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path target/release/blurred.exe -DestinationPath "dist/blurred-windows-$env:GITHUB_REF_NAME.zip" -Force

      - name: Package macOS
        if: matrix.label == 'macos'
        shell: bash
        run: |
          mkdir -p "dist/blurred.app/Contents/MacOS"
          mkdir -p "dist/blurred.app/Contents/Resources"
          cp "target/release/blurred" "dist/blurred.app/Contents/MacOS/blurred"
          cp "logo.png" "dist/blurred.app/Contents/Resources/logo.png"
          cat > "dist/blurred.app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>en</string>
            <key>CFBundleExecutable</key><string>blurred</string>
            <key>CFBundleIdentifier</key><string>com.byteface.blurred</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>blurred</string>
            <key>CFBundleDisplayName</key><string>blurred</string>
            <key>CFBundleIconFile</key><string>logo.png</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key><string>Text Documents</string>
                <key>CFBundleTypeRole</key><string>Viewer</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>public.plain-text</string>
                  <string>public.rtf</string>
                  <string>net.daringfireball.markdown</string>
                </array>
              </dict>
            </array>
            <key>LSMinimumSystemVersion</key><string>10.13</string>
          </dict>
          </plist>
          PLIST
          ditto -c -k --sequesterRsrc --keepParent "dist/blurred.app" "dist/blurred-macos-${GITHUB_REF_NAME}.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
